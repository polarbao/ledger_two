services:
  ledger-two-v13-task53:
    image: "${CANDIDATE_IMAGE:?CANDIDATE_IMAGE must be a fixed Task53 tag}"
    container_name: "${CONTAINER_NAME:-ledger-two-v13-task53-staging}"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-38092}:8080"
    environment:
      APP_ENV: production
      DEPLOYMENT_CHANNEL: staging
      IMPORT_XLSX_ENABLED: "true"
      IMPORT_CLASSIFICATION_MODE: "${IMPORT_CLASSIFICATION_MODE:-off}"
      HTTP_ADDR: ":8080"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:38092}"
      DB_DSN: /app/data/ledger.db
      BACKUP_DIR: /app/backups
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-Lax}"
      TZ: Asia/Shanghai
    volumes:
      - "${RUNTIME_ROOT:?RUNTIME_ROOT must be an isolated absolute path}/data:/app/data"
      - "${RUNTIME_ROOT:?RUNTIME_ROOT must be an isolated absolute path}/backups:/app/backups"
      - "${RUNTIME_ROOT:?RUNTIME_ROOT must be an isolated absolute path}/uploads:/app/uploads"
      - "${RUNTIME_ROOT:?RUNTIME_ROOT must be an isolated absolute path}/logs:/app/logs"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    labels:
      com.ledgertwo.release: "v1.3.0-rc-task53"
      com.ledgertwo.channel: "staging"
      com.ledgertwo.schema: "22"
