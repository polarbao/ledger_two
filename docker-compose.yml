services:
  ledger-two:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: "ledger-two:${IMAGE_TAG:?IMAGE_TAG must be set}"
    container_name: "${CONTAINER_NAME:?CONTAINER_NAME must be set}"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-38088}:8080"
    environment:
      APP_ENV: production
      DEPLOYMENT_CHANNEL: "${DEPLOYMENT_CHANNEL:?DEPLOYMENT_CHANNEL must be set}"
      HTTP_ADDR: ":8080"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:38088}"
      DB_DSN: /app/data/ledger.db
      BACKUP_DIR: /app/backups
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-Lax}"
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
