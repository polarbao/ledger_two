services:
  ledger-two:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: ledger-two:latest
    container_name: ledger-two
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      APP_BASE_URL: "http://localhost:8088"
      DB_DSN: /app/data/ledger.db
      BACKUP_DIR: /app/backups
      UPLOAD_DIR: /app/uploads
      SESSION_SECRET: "replace-with-a-long-random-string"
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
