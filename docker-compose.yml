services:
  ledger-two:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: ledger-two:latest
    container_name: ledger-two
    restart: unless-stopped
    ports:
      - "${APP_PORT:-38088}:8080"
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:38088}"
      DB_DSN: /app/data/ledger.db
      BACKUP_DIR: /app/backups
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: "replace-with-a-long-random-string-for-jwt"
      COOKIE_SECURE: "false" # HTTPS反代理时请设置为 true，HTTP局域网访问设为 false
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
