openapi: 3.0.3
info:
  title: LedgerTwo v1.2 Import API
  version: 1.2.0-rc
  description: |
    v1.2 CSV 导入模块已实现契约，覆盖 Task47-Task49。
    本文件是 openapi.yaml 的 v1.2 导入补充；实际 router 路径记录在 API_INVENTORY.md。
servers:
  - url: /api
    description: Current compatibility API root
tags:
  - name: imports
  - name: import-rules
paths:
  /imports/preview:
    post:
      tags: [imports]
      summary: Upload CSV and create preview batch
      description: Owner only. Preview must not create transactions.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, source_type]
              properties:
                file:
                  type: string
                  format: binary
                source_type:
                  type: string
                  enum: [wechat, alipay, generic]
      responses:
        "201":
          description: Preview batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatchResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /imports/{batch_id}:
    get:
      tags: [imports]
      summary: Get import batch detail
      description: Owner only.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
      responses:
        "200":
          description: Import batch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatchResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /imports/{batch_id}/rows/{row_id}:
    patch:
      tags: [imports]
      summary: Update import preview row selection
      description: Owner only. A failed batch returns to ready after its blocking row is handled.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
        - $ref: "#/components/parameters/RowIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRowUpdateRequest"
      responses:
        "200":
          description: Row updated, latest batch returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportBatchResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /imports/{batch_id}/commit:
    post:
      tags: [imports]
      summary: Commit ready import batch
      description: Owner only. Must run in a single database transaction.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
      responses:
        "200":
          description: Commit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCommitResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /import-rules:
    get:
      tags: [import-rules]
      summary: List import rules
      description: Owner only.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, all]
      responses:
        "200":
          description: Rule list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleListResponse"
    post:
      tags: [import-rules]
      summary: Create import rule
      description: Owner only. Rules create suggestions and never commit transactions.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRuleUpsertRequest"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"

  /import-rules/{rule_id}:
    patch:
      tags: [import-rules]
      summary: Update import rule
      description: Owner only.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/RuleIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRuleUpsertRequest"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
    delete:
      tags: [import-rules]
      summary: Archive import rule through the transitional delete endpoint
      description: Owner only. Compatibility endpoint; the rule is soft archived.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/RuleIdPath"
      responses:
        "200":
          description: Rule archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /import-rules/{rule_id}/archive:
    post:
      tags: [import-rules]
      summary: Archive import rule
      description: Owner only.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/RuleIdPath"
      responses:
        "200":
          description: Rule archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /import-rules/{rule_id}/restore:
    post:
      tags: [import-rules]
      summary: Restore archived import rule
      description: Owner only.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/RuleIdPath"
      responses:
        "200":
          description: Rule restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
  parameters:
    LedgerIdHeaderRequired:
      name: X-Ledger-Id
      in: header
      required: true
      schema:
        type: string
    BatchIdPath:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
    RowIdPath:
      name: row_id
      in: path
      required: true
      schema:
        type: string
    RuleIdPath:
      name: rule_id
      in: path
      required: true
      schema:
        type: string
  responses:
    Success:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          nullable: true
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    ImportPreviewMetadata:
      type: object
      required: [source_type]
      properties:
        source_type:
          type: string
          enum: [wechat, alipay, generic]
        mapping:
          type: object
          additionalProperties:
            type: string
    ImportBatchResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [id, source_type, status, total_rows, rows]
          properties:
            id:
              type: string
            ledger_id:
              type: string
            source_type:
              type: string
              enum: [wechat, alipay, generic]
            filename:
              type: string
            file_sha256:
              type: string
            status:
              type: string
              enum: [previewing, ready, committed, failed, expired]
            total_rows:
              type: integer
            new_rows:
              type: integer
            duplicate_rows:
              type: integer
            suspicious_rows:
              type: integer
            invalid_rows:
              type: integer
            imported_rows:
              type: integer
            skipped_rows:
              type: integer
            failed_rows:
              type: integer
            committed_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            created_by_user_id:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            rows:
              type: array
              items:
                $ref: "#/components/schemas/ImportRow"
    ImportRowResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ImportRow"
    ImportRow:
      type: object
      required: [id, row_number, amount_cents, duplicate_status, row_status]
      properties:
        id:
          type: string
        row_number:
          type: integer
        occurred_at:
          type: string
          format: date-time
        title:
          type: string
        merchant:
          type: string
        description:
          type: string
        amount_cents:
          type: integer
          format: int64
        direction:
          type: string
          enum: [expense, income, refund, transfer, unknown]
        target_transaction_type:
          type: string
          enum: [expense, income, skipped]
        duplicate_status:
          type: string
          enum: [new, duplicate, suspicious, invalid]
        row_status:
          type: string
          enum: [pending, adjusted, skipped, imported, failed]
        source_account:
          type: string
        external_order_id:
          type: string
        suspicious_reason:
          type: string
        suggested_category_id:
          type: string
        suggested_account_id:
          type: string
        suggested_tag_ids:
          type: array
          items:
            type: string
        suggested_rule_id:
          type: string
        suggestion_reason:
          type: string
        selected_category_id:
          type: string
        selected_account_id:
          type: string
        selected_tag_ids:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [private, partner_readable, shared]
        error:
          nullable: true
          type: object
          properties:
            code:
              type: string
            message:
              type: string
    ImportSuggestion:
      type: object
      properties:
        category_id:
          type: string
        account_id:
          type: string
        tag_ids:
          type: array
          items:
            type: string
        rule_id:
          type: string
        reason:
          type: string
    ImportSelectedFields:
      type: object
      properties:
        category_id:
          type: string
        account_id:
          type: string
        tag_ids:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [private, partner_readable, shared]
    ImportRowUpdateRequest:
      type: object
      properties:
        selected_category_id:
          type: string
        selected_account_id:
          type: string
        selected_tag_ids:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [private, partner_readable, shared]
        row_status:
          type: string
          enum: [pending, adjusted, skipped]
        target_transaction_type:
          type: string
          enum: [expense, income, skipped]
    ImportCommitResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [batch_id, status, imported_rows, skipped_rows, failed_rows]
          properties:
            batch_id:
              type: string
            status:
              type: string
              enum: [committed]
            imported_rows:
              type: integer
            skipped_rows:
              type: integer
            failed_rows:
              type: integer
            generated_transaction_ids:
              type: array
              items:
                type: string
    ImportRuleListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ImportRule"
    ImportRuleResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ImportRule"
    ImportRule:
      type: object
      required: [id, name, match_type, pattern, priority, status]
      properties:
        id:
          type: string
        name:
          type: string
        match_type:
          type: string
          enum: [merchant_contains, description_contains, source_account, amount_range]
        pattern:
          type: string
        amount_min_cents:
          type: integer
          nullable: true
        amount_max_cents:
          type: integer
          nullable: true
        priority:
          type: integer
        status:
          type: string
          enum: [active, archived]
        result:
          $ref: "#/components/schemas/ImportSelectedFields"
        created_by_user_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
    ImportRuleUpsertRequest:
      type: object
      required: [match_type, pattern, result]
      properties:
        name:
          type: string
        match_type:
          type: string
          enum: [merchant_contains, description_contains, source_account, amount_range]
        pattern:
          type: string
        amount_min_cents:
          type: integer
          nullable: true
        amount_max_cents:
          type: integer
          nullable: true
        priority:
          type: integer
        result:
          $ref: "#/components/schemas/ImportSelectedFields"
