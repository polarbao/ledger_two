openapi: 3.0.3
info:
  title: LedgerTwo v1.3 Category and Tag Intelligence API
  version: 1.3.0-task53-draft
  description: |
    Task53 分类、标签、默认元数据和导入分级自动化增量契约。
    Task53.1-Task53.3 的 schema 22、default-profile、分类器、预览持久化和 reclassify 已实现。
    bulk-adjust 已在 Task53.4A 实现并同步正式 OpenAPI；显式学习、规则扩展和兜底替代仍是 Task53.4B/C 草案，现状以 API_INVENTORY.md 为准。
servers:
  - url: /api
tags:
  - name: metadata-defaults
    description: Built-in category/tag profile preview and atomic application.
  - name: import-classification
    description: Explicit bulk adjustment, learning and reclassification for import previews.

paths:
  /metadata/default-profile:
    get:
      tags: [metadata-defaults]
      summary: Get the built-in metadata profile definition
      operationId: getMetadataDefaultProfile
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - name: profile
          in: query
          schema:
            type: string
            enum: [basic_cn_v1, empty]
            default: basic_cn_v1
      responses:
        "200":
          description: Profile definition and current ledger resolution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataProfileResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /metadata/default-profile/preview:
    post:
      tags: [metadata-defaults]
      summary: Preview applying a metadata profile to the current ledger
      operationId: previewMetadataDefaultProfile
      description: Read-only. It must not create, rename, archive, or bind system keys.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataProfilePreviewRequest"
      responses:
        "200":
          description: Profile conflict and action preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataProfilePreviewResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /metadata/default-profile/apply:
    post:
      tags: [metadata-defaults]
      summary: Apply a metadata profile atomically
      operationId: applyMetadataDefaultProfile
      description: Owner-only. Conflicts must be resolved explicitly before the transaction starts.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataProfileApplyRequest"
      responses:
        "200":
          description: Applied or idempotent no-op
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataProfileApplyResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /imports/{batchId}/rows/bulk-adjust:
    post:
      tags: [import-classification]
      summary: Apply an explicit classification adjustment to selected preview rows
      operationId: bulkAdjustImportClassifications
      description: |
        Owner-only and ready-batch-only. accept_suggestions consumes only persisted
        suggestions. apply_values uses the explicit category/account/tag values from
        this request. Neither action creates a learned rule or a transaction.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/BatchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkClassificationRequest"
      responses:
        "200":
          description: Updated batch summary and affected row count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkClassificationResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /imports/{batchId}/rows/{rowId}/learn:
    post:
      tags: [import-classification]
      summary: Create or update an explicit learned merchant rule
      operationId: learnImportMerchantRule
      description: |
        Uses the already-saved final category and tags on this row. The preview row
        adjustment is a separate request, so learning failure must not roll it back.
        Accounts and visibility are never copied into learned rules.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/BatchId"
        - $ref: "#/components/parameters/RowId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearnMerchantRequest"
      responses:
        "200":
          description: Learned rule created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnMerchantResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /imports/{batchId}/reclassify:
    post:
      tags: [import-classification]
      summary: Re-run current rules for eligible rows in a ready batch
      operationId: reclassifyImportBatch
      description: Manual and bulk-adjusted rows are never overwritten.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/BatchId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Reclassification change summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReclassifyResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /import-rules/:
    get:
      tags: [import-classification]
      summary: List import classification rules with lifecycle and committed-hit diagnostics
      operationId: listImportClassificationRules
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, all]
            default: all
      responses:
        "200":
          description: Current-ledger rules only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
    post:
      tags: [import-classification]
      summary: Create an explicit manual import classification rule
      operationId: createImportClassificationRule
      description: origin and confidence are server-owned; this endpoint always creates origin=manual and confidence=high.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRuleUpsertRequest"
      responses:
        "201":
          description: Manual rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /import-rules/{ruleId}:
    patch:
      tags: [import-classification]
      summary: Update an import classification rule
      operationId: updateImportClassificationRule
      description: |
        origin never changes. For learned rules, merchant_equals, normalized pattern,
        and source_type are immutable; result, name, priority and apply_mode remain editable.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/RuleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRuleUpsertRequest"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /import-rules/{ruleId}/archive:
    post:
      tags: [import-classification]
      summary: Archive an import classification rule
      operationId: archiveImportClassificationRule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/RuleId"
      responses:
        "200":
          description: Rule archived idempotently
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /import-rules/{ruleId}/restore:
    post:
      tags: [import-classification]
      summary: Restore a valid archived import classification rule
      operationId: restoreImportClassificationRule
      description: Restore is rejected while any result metadata reference is missing or archived.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/RuleId"
      responses:
        "200":
          description: Rule restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRuleResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /metadata/categories/{categoryId}/archive:
    post:
      tags: [metadata-defaults]
      summary: Archive a category, replacing a fallback system key when required
      operationId: archiveCategoryWithFallbackSafeguard
      description: |
        This is the concrete categories form of the existing metadata archive route.
        For expense_other or income_other, replacement_category_id is mandatory and
        the system_key transfer plus archive is atomic. Historical transactions and
        rule result_json values are not rewritten.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataArchiveRequest"
      responses:
        "200":
          description: Category archived and optional fallback key transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataArchiveResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /metadata/{kind}/:
    get:
      tags: [metadata-defaults]
      summary: List metadata with current-ledger active-rule reference counts
      operationId: listMetadataWithRuleReferences
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerHeader"
        - $ref: "#/components/parameters/MetadataKind"
        - name: include_archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Metadata list. rule_reference_count never includes another ledger.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataItemListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  parameters:
    LedgerHeader:
      name: X-Ledger-Id
      in: header
      required: true
      schema:
        type: string
    BatchId:
      name: batchId
      in: path
      required: true
      schema:
        type: string
    RowId:
      name: rowId
      in: path
      required: true
      schema:
        type: string
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    MetadataKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [categories, tags, accounts]

  responses:
    Error:
      description: Standard error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data: {}

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - BAD_REQUEST
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - LEDGER_REQUIRED
                - LEDGER_ACCESS_DENIED
                - LEDGER_OBJECT_NOT_FOUND
                - IMPORT_BATCH_NOT_FOUND
                - IMPORT_ROW_INVALID
                - IMPORT_COMMIT_CONFLICT
                - IMPORT_BULK_ADJUST_CONFLICT
                - CATEGORY_FALLBACK_REQUIRED
                - CATEGORY_FALLBACK_REPLACEMENT_INVALID
                - CATEGORY_TYPE_MISMATCH
                - TAG_LIMIT_EXCEEDED
                - CLASSIFICATION_CONFLICT
                - CLASSIFICATION_RULE_STALE
                - CLASSIFICATION_MERCHANT_REQUIRED
                - METADATA_PROFILE_CONFLICT
                - IMPORT_RECLASSIFY_CONFLICT
            message:
              type: string
            details:
              type: object
              additionalProperties: true
              nullable: true

    MetadataProfileItem:
      type: object
      required: [system_key, kind, name, action]
      properties:
        system_key:
          type: string
        kind:
          type: string
          enum: [expense_category, income_category, tag]
        name:
          type: string
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        action:
          type: string
          enum: [create, reuse, skip, conflict, existing]
        existing_id:
          type: string
          nullable: true

    MetadataProfile:
      type: object
      required: [key, version, items]
      properties:
        key:
          type: string
          enum: [basic_cn_v1, empty]
        version:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/MetadataProfileItem"

    MetadataProfileResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MetadataProfile"

    MetadataProfilePreviewRequest:
      type: object
      required: [profile]
      properties:
        profile:
          type: string
          enum: [basic_cn_v1, empty]

    MetadataProfilePreviewResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [profile, create_count, reuse_count, conflict_count]
              properties:
                profile:
                  $ref: "#/components/schemas/MetadataProfile"
                create_count:
                  type: integer
                reuse_count:
                  type: integer
                conflict_count:
                  type: integer

    MetadataConflictResolution:
      type: object
      required: [system_key, action]
      properties:
        system_key:
          type: string
        action:
          type: string
          enum: [reuse, skip]
        existing_id:
          type: string
          nullable: true

    MetadataProfileApplyRequest:
      type: object
      required: [profile, resolutions]
      properties:
        profile:
          type: string
          enum: [basic_cn_v1, empty]
        resolutions:
          type: array
          items:
            $ref: "#/components/schemas/MetadataConflictResolution"

    MetadataProfileApplyResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [profile, created_count, reused_count, skipped_count, metadata_profile_version]
              properties:
                profile:
                  type: string
                created_count:
                  type: integer
                reused_count:
                  type: integer
                skipped_count:
                  type: integer
                metadata_profile_version:
                  type: integer

    Classification:
      type: object
      description: Additive PreviewRow classification projection. Final selected values remain on the existing PreviewRow selected_* fields.
      required: [status, confidence, matched_rule_ids, suggested_tag_ids]
      properties:
        status:
          type: string
          enum: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
        confidence:
          type: string
          enum: [high, medium, low, none]
        source:
          type: string
          nullable: true
          enum: [manual, bulk, user_rule, learned_rule, builtin, fallback]
        reason_code:
          type: string
          nullable: true
        reason_text:
          type: string
          nullable: true
        matched_rule_ids:
          type: array
          items:
            type: string
        suggested_category_id:
          type: string
          nullable: true
        suggested_account_id:
          type: string
          nullable: true
        suggested_tag_ids:
          type: array
          items:
            type: string

    ClassificationSummary:
      type: object
      required: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
      properties:
        auto_selected:
          type: integer
          minimum: 0
        suggested:
          type: integer
          minimum: 0
        fallback:
          type: integer
          minimum: 0
        manual:
          type: integer
          minimum: 0
        bulk:
          type: integer
          minimum: 0
        conflict:
          type: integer
          minimum: 0
        unresolved:
          type: integer
          minimum: 0

    BulkClassificationRequest:
      type: object
      required: [row_ids, action]
      description: |
        For action=accept_suggestions, category/account/tag fields must be omitted.
        For action=apply_values, category_id, account_id and tag_ids are all required;
        account_id may be null to clear the account.
      properties:
        row_ids:
          type: array
          minItems: 1
          maxItems: 500
          uniqueItems: true
          items:
            type: string
        action:
          type: string
          enum: [accept_suggestions, apply_values]
          description: accept_suggestions accepts each row's persisted suggestion; apply_values writes the shared category, account and tags below.
        category_id:
          type: string
          description: Required only when action=apply_values.
        account_id:
          type: string
          nullable: true
          description: Required when action=apply_values; null clears the account for all successfully updated rows.
        tag_ids:
          type: array
          maxItems: 8
          uniqueItems: true
          items:
            type: string
          description: Required only when action=apply_values; use an empty array to clear tags. More than 8 tags rejects the whole request.

    BulkClassificationResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [affected_rows, skipped_rows, conflict_rows, updated_row_ids, skipped_row_ids, conflict_row_ids, errors, summary]
              properties:
                affected_rows:
                  type: integer
                skipped_rows:
                  type: integer
                conflict_rows:
                  type: integer
                updated_row_ids:
                  type: array
                  items:
                    type: string
                skipped_row_ids:
                  type: array
                  items:
                    type: string
                conflict_row_ids:
                  type: array
                  items:
                    type: string
                errors:
                  type: array
                  items:
                    $ref: "#/components/schemas/ClassificationRowError"
                summary:
                  $ref: "#/components/schemas/ClassificationSummary"

    ClassificationRowError:
      type: object
      required: [row_id, code, message]
      properties:
        row_id:
          type: string
        code:
          type: string
        message:
          type: string

    ImportRuleResult:
      type: object
      properties:
        category_id:
          type: string
          nullable: true
        account_id:
          type: string
          nullable: true
        tag_ids:
          type: array
          maxItems: 8
          uniqueItems: true
          items:
            type: string
        visibility:
          type: string
          nullable: true
          deprecated: true
          description: Legacy Task49 field. The Task53 classifier does not alter visibility.

    ImportRuleUpsertRequest:
      type: object
      required: [match_type, pattern, result]
      properties:
        name:
          type: string
        match_type:
          type: string
          enum: [merchant_equals, merchant_contains, description_contains, source_account, amount_range]
        pattern:
          type: string
        amount_min_cents:
          type: integer
          format: int64
          nullable: true
        amount_max_cents:
          type: integer
          format: int64
          nullable: true
        priority:
          type: integer
          default: 100
        source_type:
          type: string
          nullable: true
          enum: [wechat, alipay, generic]
          description: null means all supported sources.
        apply_mode:
          type: string
          enum: [auto, suggest]
          default: suggest
        result:
          $ref: "#/components/schemas/ImportRuleResult"

    ImportRule:
      type: object
      required: [id, name, match_type, pattern, priority, status, origin, apply_mode, confidence, result, is_stale, stale_reference_ids, committed_hit_count, created_by_user_id, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        match_type:
          type: string
          enum: [merchant_equals, merchant_contains, description_contains, source_account, amount_range]
        pattern:
          type: string
        amount_min_cents:
          type: integer
          format: int64
          nullable: true
        amount_max_cents:
          type: integer
          format: int64
          nullable: true
        priority:
          type: integer
        status:
          type: string
          enum: [active, archived]
        origin:
          type: string
          enum: [manual, learned]
        source_type:
          type: string
          nullable: true
          enum: [wechat, alipay, generic]
        apply_mode:
          type: string
          enum: [auto, suggest]
        confidence:
          type: string
          enum: [high]
          description: Manual and learned v1 rules are server-owned high-confidence inputs; apply_mode controls selection versus suggestion.
        result:
          $ref: "#/components/schemas/ImportRuleResult"
        is_stale:
          type: boolean
        stale_reference_ids:
          type: array
          items:
            type: string
        committed_hit_count:
          type: integer
          minimum: 0
          description: Count of imported rows in committed batches whose persisted matched_rule_ids contains this rule.
        last_committed_hit_at:
          type: string
          format: date-time
          nullable: true
        created_by_user_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
          nullable: true

    ImportRuleResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ImportRule"

    ImportRuleListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ImportRule"

    MetadataItem:
      type: object
      required: [id, ledger_id, name, sort_order, usage_count, rule_reference_count, is_archived]
      properties:
        id:
          type: string
        ledger_id:
          type: string
        system_key:
          type: string
          nullable: true
        name:
          type: string
        type:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        sort_order:
          type: integer
        usage_count:
          type: integer
          minimum: 0
        rule_reference_count:
          type: integer
          minimum: 0
          description: Number of active current-ledger import rules whose result references this item.
        is_archived:
          type: boolean

    MetadataItemListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/MetadataItem"

    MetadataArchiveRequest:
      type: object
      properties:
        replacement_category_id:
          type: string
          nullable: true
          description: Required only when archiving expense_other or income_other.

    MetadataArchiveResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [archived_id, fallback_replaced]
              properties:
                archived_id:
                  type: string
                fallback_replaced:
                  type: boolean
                transferred_system_key:
                  type: string
                  nullable: true
                  enum: [expense_other, income_other]
                replacement_category_id:
                  type: string
                  nullable: true

    LearnMerchantRequest:
      type: object
      required: [source_scope]
      properties:
        source_scope:
          type: string
          enum: [current_source, all_sources]
          default: current_source
      description: The server reads category and tags from the saved preview row. Client-supplied classification values are not accepted.

    LearnMerchantResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [rule_id, action, normalized_merchant, source_scope]
              properties:
                rule_id:
                  type: string
                action:
                  type: string
                  enum: [created, updated, restored]
                normalized_merchant:
                  type: string
                source_scope:
                  type: string
                  enum: [current_source, all_sources]
                source_type:
                  type: string
                  nullable: true
                  enum: [wechat, alipay, generic]

    ReclassifyResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [dry_run, eligible_rows, changed_rows, unchanged_rows, protected_manual_rows, protected_bulk_rows, conflict_rows, summary, changes]
              properties:
                dry_run:
                  type: boolean
                eligible_rows:
                  type: integer
                changed_rows:
                  type: integer
                unchanged_rows:
                  type: integer
                protected_manual_rows:
                  type: integer
                protected_bulk_rows:
                  type: integer
                conflict_rows:
                  type: integer
                summary:
                  $ref: "#/components/schemas/ClassificationSummary"
                changes:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReclassifyRowChange"

    ReclassifyRowChange:
      type: object
      required: [row_id, old_status, new_status, old_tag_ids, new_tag_ids]
      properties:
        row_id:
          type: string
        old_status:
          type: string
          enum: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
        new_status:
          type: string
          enum: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
        old_category_id:
          type: string
          nullable: true
        new_category_id:
          type: string
          nullable: true
        old_tag_ids:
          type: array
          items:
            type: string
        new_tag_ids:
          type: array
          items:
            type: string

    LedgerCreateMetadataExtension:
      type: object
      description: Additive Task53 extension for POST /ledgers and first setup requests.
      properties:
        metadata_profile:
          type: string
          enum: [basic_cn_v1, empty]
          default: basic_cn_v1
