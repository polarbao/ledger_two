openapi: 3.0.3
info:
  title: LedgerTwo API
  version: 1.3.0-rc
  description: |
    LedgerTwo v1.3 当前实现正式契约。实际路径为 /api/...；
    /api/v1 alias 尚未实现，不能作为已上线接口使用。
    所有账本内业务接口必须使用 X-Ledger-Id 或账本 path 参数建立显式上下文，
    不再支持首账本 fallback。金额字段均为整数分。
servers:
  - url: /api
    description: Current compatibility API root
security: []
tags:
  - name: health
  - name: init
  - name: auth
  - name: ledgers
  - name: metadata
  - name: transactions
  - name: import
  - name: templates
  - name: recurring
  - name: shared-expenses
  - name: settlements
  - name: safety
  - name: reports
  - name: attachments

paths:
  /healthz:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /init/status:
    get:
      tags: [init]
      summary: Get initialization status
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /init/setup:
    post:
      tags: [init]
      summary: Initialize application, first user and first ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitSetupRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and token cookie is set
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      tags: [auth]
      summary: Logout and clear token cookie
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /auth/me:
    get:
      tags: [auth]
      summary: Get current user
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ledgers/:
    get:
      tags: [ledgers]
      summary: List ledgers visible to current user
      description: 默认只返回 active；结果不承担当前账本 fallback。
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, archived, all]
            default: active
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [ledgers]
      summary: Create an active ledger
      description: 创建者成为唯一 Owner；创建同名账本合法。
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLedgerRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ledgers/{ledgerId}:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
    get:
      tags: [ledgers]
      summary: Get one active or archived ledger
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags: [ledgers]
      summary: Rename an active ledger
      description: Owner only. Repeated stale versions return LEDGER_VERSION_CONFLICT.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /ledgers/{ledgerId}/archive-preflight:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
    get:
      tags: [ledgers]
      summary: Preview archive consequences without writing data
      description: Owner only. Returns unsettled balance and unexpired ready import count.
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"

  /ledgers/{ledgerId}/archive:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
    post:
      tags: [ledgers]
      summary: Archive an active ledger
      description: Owner only. Archive is read-only and never creates settlement or rewrites history.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                acknowledge_unsettled_balance:
                  type: boolean
                  default: false
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /ledgers/{ledgerId}/restore:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
    post:
      tags: [ledgers]
      summary: Restore an archived ledger
      description: Owner only. This is the only archived-ledger mutation.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /ledgers/{ledgerId}/members:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
    get:
      tags: [ledgers]
      summary: List ledger members
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [ledgers]
      summary: Add the second ledger member
      description: Owner only. Requires If-Match and explicit history visibility acknowledgement.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
  /ledgers/{ledgerId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
      - $ref: "#/components/parameters/UserIdPath"
    patch:
      tags: [ledgers]
      summary: Update ledger member role
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    put:
      tags: [ledgers]
      summary: Update ledger member role (deprecated compatibility alias)
      deprecated: true
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [ledgers]
      summary: Remove ledger member
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /ledgers/{ledgerId}/members/{userId}/transfer-owner:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
      - $ref: "#/components/parameters/UserIdPath"
    post:
      tags: [ledgers]
      summary: Transfer unique ledger ownership atomically
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acknowledge_permission_change]
              properties:
                acknowledge_permission_change:
                  type: boolean
                  enum: [true]
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /ledgers/{ledgerId}/leave:
    parameters:
      - $ref: "#/components/parameters/LedgerIdPath"
    post:
      tags: [ledgers]
      summary: Leave ledger as Editor or Viewer
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatchLedger"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /categories:
    get:
      tags: [metadata]
      summary: List categories
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
          description: When true, archived categories are included for historical transaction display.
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /accounts:
    get:
      tags: [metadata]
      summary: List accounts
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /metadata/{kind}/:
    parameters:
      - $ref: "#/components/parameters/MetadataKindPath"
      - $ref: "#/components/parameters/LedgerIdHeaderRequired"
    get:
      tags: [metadata]
      summary: List metadata items
      security:
        - cookieAuth: []
      parameters:
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [metadata]
      summary: Create metadata item
      description: Owner only. kind supports categories, tags and accounts.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataUpsertRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /metadata/{kind}/reorder:
    parameters:
      - $ref: "#/components/parameters/MetadataKindPath"
      - $ref: "#/components/parameters/LedgerIdHeaderRequired"
    post:
      tags: [metadata]
      summary: Reorder metadata items
      description: Owner only. Updates sort_order for the submitted ids; archived items may be omitted.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataReorderRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /metadata/{kind}/{id}:
    parameters:
      - $ref: "#/components/parameters/MetadataKindPath"
      - $ref: "#/components/parameters/GenericIdPath"
      - $ref: "#/components/parameters/LedgerIdHeaderRequired"
    patch:
      tags: [metadata]
      summary: Update metadata item
      description: Owner only.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataUpsertRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /metadata/{kind}/{id}/archive:
    post:
      tags: [metadata]
      summary: Archive metadata item
      description: Owner only. Archived items are hidden from create/edit selectors but remain available for historical records.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/MetadataKindPath"
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /metadata/{kind}/{id}/restore:
    post:
      tags: [metadata]
      summary: Restore archived metadata item
      description: Owner only.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/MetadataKindPath"
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /transaction-defaults:
    get:
      tags: [transactions]
      summary: Get current user's quick transaction defaults
      description: Returns per-ledger, per-user transaction defaults. Archived category, account and tags are omitted from the response.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"

  /transactions/:
    get:
      tags: [transactions]
      summary: List transactions
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
        - $ref: "#/components/parameters/TypeQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [transactions]
      summary: Create ordinary transaction
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
  /transactions/{transactionId}:
    parameters:
      - $ref: "#/components/parameters/TransactionIdPath"
      - $ref: "#/components/parameters/LedgerIdHeaderRequired"
    get:
      tags: [transactions]
      summary: Get transaction detail
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [transactions]
      summary: Update transaction
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags: [transactions]
      summary: Soft delete transaction
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
  /transactions/batch-tag:
    post:
      tags: [transactions]
      summary: Batch update transaction tags
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /transactions/import/parse:
    post:
      tags: [import]
      summary: Parse CSV import file
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
  /transactions/import/analyze:
    post:
      tags: [import]
      summary: Analyze import items
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /transactions/import/commit:
    post:
      tags: [import]
      summary: Commit import batch
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /imports/preview:
    post:
      tags: [import]
      summary: Create a CSV or WeChat XLSX preview batch
      description: Owner only. Preview does not create formal transactions.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [source_type, file]
              properties:
                source_type:
                  type: string
                  enum: [wechat, alipay, generic]
                file:
                  type: string
                  format: binary
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
  /imports/{batchID}:
    get:
      tags: [import]
      summary: Get a preview batch and rows
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/NotFound"
  /imports/{batchID}/rows/{rowID}:
    patch:
      tags: [import]
      summary: Adjust one preview row
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
        - $ref: "#/components/parameters/RowIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/NotFound"
  /imports/{batchID}/commit:
    post:
      tags: [import]
      summary: Commit a ready preview batch atomically
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "409":
          $ref: "#/components/responses/Conflict"
  /imports/{batchID}/discard:
    post:
      tags: [import]
      summary: Discard a ready preview batch without creating transactions
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/BatchIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  enum: [user_requested]
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "409":
          $ref: "#/components/responses/Conflict"

  /import-rules/:
    get:
      tags: [import]
      summary: List import rules
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [import]
      summary: Create import rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "201":
          $ref: "#/components/responses/Success"
  /import-rules/{ruleID}:
    patch:
      tags: [import]
      summary: Update an import suggestion rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RuleIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [import]
      summary: Archive import rule (deprecated compatibility alias)
      deprecated: true
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RuleIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /import-rules/{ruleID}/archive:
    post:
      tags: [import]
      summary: Archive an import suggestion rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RuleIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /import-rules/{ruleID}/restore:
    post:
      tags: [import]
      summary: Restore an archived import suggestion rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/RuleIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /transaction-templates/:
    get:
      tags: [templates]
      summary: List transaction templates
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [templates]
      summary: Create transaction template
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /transaction-templates/{id}:
    parameters:
      - $ref: "#/components/parameters/GenericIdPath"
      - $ref: "#/components/parameters/LedgerIdHeaderRequired"
    get:
      tags: [templates]
      summary: Get transaction template
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [templates]
      summary: Update transaction template
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [templates]
      summary: Archive transaction template through legacy delete endpoint
      description: Backward-compatible soft archive. New clients should use POST /transaction-templates/{id}/archive.
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /transaction-templates/{id}/archive:
    post:
      tags: [templates]
      summary: Archive transaction template
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /transaction-templates/{id}/restore:
    post:
      tags: [templates]
      summary: Restore archived transaction template
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /recurring-rules/:
    get:
      tags: [recurring]
      summary: List recurring rules
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [recurring]
      summary: Create recurring rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /recurring-rules/{id}:
    delete:
      tags: [recurring]
      summary: Delete recurring rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /recurring-reminders/:
    get:
      tags: [recurring]
      summary: List pending recurring reminders
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /recurring-reminders/{id}/confirm:
    post:
      tags: [recurring]
      summary: Confirm recurring reminder
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /recurring-reminders/{id}/skip:
    post:
      tags: [recurring]
      summary: Skip the current recurring reminder occurrence
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /recurring-reminders/{id}/ignore:
    post:
      tags: [recurring]
      summary: Skip recurring reminder (deprecated compatibility alias)
      deprecated: true
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GenericIdPath"
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /shared-expenses/:
    post:
      tags: [shared-expenses]
      summary: Create shared expense
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSharedExpenseRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /shared-expenses/{id}:
    parameters:
      - $ref: "#/components/parameters/GenericIdPath"
      - $ref: "#/components/parameters/LedgerIdHeaderRequired"
    get:
      tags: [shared-expenses]
      summary: Get shared expense
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
    patch:
      tags: [shared-expenses]
      summary: Update shared expense
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSharedExpenseRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"

  /settlements/balance:
    get:
      tags: [settlements]
      summary: Get shared expense balance
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /settlements/:
    get:
      tags: [settlements]
      summary: List settlements
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [settlements]
      summary: Create settlement
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSettlementRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/diagnostics:
    get:
      tags: [safety]
      summary: Get sanitized system diagnostics
      description: Instance administrator only. Ignores X-Ledger-Id and writes instance audit.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Sanitized diagnostics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemDiagnostics"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/backup:
    post:
      tags: [safety]
      summary: Create manual backup
      description: Instance administrator only. Creates a whole-instance SQLite backup.
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /admin/restore:
    post:
      tags: [safety]
      summary: Prepare an offline restore
      description: Instance administrator only. Returns shutdown instructions and does not hot-swap the running database.
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /admin/backups:
    get:
      tags: [safety]
      summary: List backups
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /admin/backups/{filename}:
    get:
      tags: [safety]
      summary: Download backup
      security:
        - cookieAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /export/transactions.csv:
    get:
      tags: [safety]
      summary: Export transactions CSV
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
  /export/full.json:
    get:
      tags: [safety]
      summary: Export a portable read-only ledger JSON package
      description: |
        Owner/Editor only. Contains current-ledger data visible to the actor,
        including historical referenced users, metadata, transactions, splits,
        attachment references, templates, recurring data, imports and audit.
        This package is not a physical SQLite backup and cannot be restored directly.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          description: Raw ledger export package, not wrapped in the success envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerExportPackage"

  /reports/monthly-summary:
    get:
      tags: [reports]
      summary: Monthly summary
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/category-summary:
    get:
      tags: [reports]
      summary: Category summary
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/tag-summary:
    get:
      tags: [reports]
      summary: Tag summary
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /reports/member-summary:
    get:
      tags: [reports]
      summary: Member summary
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /dashboard:
    get:
      tags: [reports]
      summary: Dashboard data
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /attachments:
    post:
      tags: [attachments]
      summary: Upload attachment
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /attachments/{filename}:
    get:
      tags: [attachments]
      summary: Get protected attachment
      description: Reads an uploaded attachment only when the current user can view the transaction that references the legacy `/uploads/{filename}` path.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LedgerIdHeaderRequired"
        - $ref: "#/components/parameters/FilenamePath"
      responses:
        "200":
          description: Binary attachment content.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  parameters:
    LedgerIdHeaderRequired:
      name: X-Ledger-Id
      in: header
      required: true
      description: Explicit ledger id required for ledger-scoped business APIs.
      schema:
        type: string
    IfMatchLedger:
      name: If-Match
      in: header
      required: true
      description: Ledger ETag in the form "ledger:{ledgerId}:v{version}".
      schema:
        type: string
    FilenamePath:
      name: filename
      in: path
      required: true
      description: Attachment filename without path separators.
      schema:
        type: string
    LedgerIdPath:
      name: ledgerId
      in: path
      required: true
      schema:
        type: string
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
    TransactionIdPath:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
    GenericIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    BatchIdPath:
      name: batchID
      in: path
      required: true
      schema:
        type: string
    RowIdPath:
      name: rowID
      in: path
      required: true
      schema:
        type: string
    RuleIdPath:
      name: ruleID
      in: path
      required: true
      schema:
        type: string
    MetadataKindPath:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [categories, tags, accounts]
    MonthQuery:
      name: month
      in: query
      required: false
      description: Month in YYYY-MM format.
      schema:
        type: string
        pattern: "^\\d{4}-\\d{2}$"
    TypeQuery:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum: [expense, income, shared_expense, settlement]

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Success:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          additionalProperties: true
          nullable: true
    HealthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [status, db, version, schema_version, deployment_channel, import_xlsx_enabled]
          properties:
            status:
              type: string
              enum: [ok]
            db:
              type: string
              enum: [ok, error, none]
            version:
              type: string
              example: 1.3.0-rc
            schema_version:
              type: integer
              format: int64
            deployment_channel:
              type: string
              enum: [development, staging, production, unknown]
            import_xlsx_enabled:
              type: boolean
              description: Whether this runtime accepts XLSX files for WeChat import previews. Alipay and generic remain CSV-only.
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true
    SystemDiagnostics:
      type: object
      required: [env, deployment_channel, app_base_url_set, cookie_secure, cookie_samesite, database, storage, audit_action_count, generated_at]
      properties:
        env:
          type: string
          example: production
        deployment_channel:
          type: string
          enum: [development, staging, production, unknown]
        app_base_url_set:
          type: boolean
        cookie_secure:
          type: string
          example: "true"
        cookie_samesite:
          type: string
          example: Lax
        database:
          $ref: "#/components/schemas/DiagnosticStatus"
        storage:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticStatus"
        latest_backup:
          $ref: "#/components/schemas/BackupInfo"
        audit_action_count:
          type: object
          additionalProperties:
            type: integer
        generated_at:
          type: string
          format: date-time
    DiagnosticStatus:
      type: object
      required: [key, label, status, configured]
      properties:
        key:
          type: string
          example: backup_dir
        label:
          type: string
          example: 备份目录
        status:
          type: string
          enum: [ok, warning, error]
        configured:
          type: boolean
        writable:
          type: boolean
        message:
          type: string
        version:
          type: integer
          format: int64
    BackupInfo:
      type: object
      required: [filename, size_bytes, created_at]
      properties:
        filename:
          type: string
          description: Relative backup filename, never an absolute path.
        size_bytes:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    LedgerExportPackage:
      type: object
      required:
        - manifest
        - ledger_members
        - users
        - categories
        - tags
        - accounts
        - transaction_defaults
        - transactions
        - transaction_tags
        - transaction_splits
        - settlements
        - transaction_templates
        - recurring_rules
        - recurring_reminders
        - import_batches
        - import_items
        - transaction_import_refs
        - import_rules
        - audit_logs
      properties:
        manifest:
          $ref: "#/components/schemas/LedgerExportManifest"
        ledger_members:
          $ref: "#/components/schemas/LedgerExportRecords"
        users:
          $ref: "#/components/schemas/LedgerExportRecords"
        categories:
          $ref: "#/components/schemas/LedgerExportRecords"
        tags:
          $ref: "#/components/schemas/LedgerExportRecords"
        accounts:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_defaults:
          $ref: "#/components/schemas/LedgerExportRecords"
        transactions:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_tags:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_splits:
          $ref: "#/components/schemas/LedgerExportRecords"
        settlements:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_templates:
          $ref: "#/components/schemas/LedgerExportRecords"
        recurring_rules:
          $ref: "#/components/schemas/LedgerExportRecords"
        recurring_reminders:
          $ref: "#/components/schemas/LedgerExportRecords"
        import_batches:
          $ref: "#/components/schemas/LedgerExportRecords"
        import_items:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_import_refs:
          $ref: "#/components/schemas/LedgerExportRecords"
        import_rules:
          $ref: "#/components/schemas/LedgerExportRecords"
        audit_logs:
          $ref: "#/components/schemas/LedgerExportRecords"
    LedgerExportManifest:
      type: object
      required: [format, format_version, purpose, restorable, exported_at, schema_version, ledger, actor]
      properties:
        format:
          type: string
          enum: [ledger_two_ledger_export]
        format_version:
          type: integer
          enum: [1]
        purpose:
          type: string
          enum: [portable_read_only_snapshot]
        restorable:
          type: boolean
          enum: [false]
        exported_at:
          type: string
          format: date-time
        schema_version:
          type: integer
          format: int64
          example: 21
        ledger:
          type: object
          required: [id, name, default_currency, status, version, created_at, updated_at]
          additionalProperties: true
        actor:
          type: object
          required: [user_id, role]
          properties:
            user_id:
              type: string
            role:
              type: string
              enum: [owner, editor]
    LedgerExportRecords:
      type: array
      items:
        type: object
        additionalProperties: true

    InitSetupRequest:
      type: object
      required:
        - ledger_name
        - user_a_username
        - user_a_display_name
        - user_a_password
        - user_b_username
        - user_b_display_name
        - user_b_password
      properties:
        ledger_name:
          type: string
        default_currency:
          type: string
          default: CNY
        user_a_username:
          type: string
        user_a_display_name:
          type: string
        user_a_password:
          type: string
          format: password
        user_b_username:
          type: string
        user_b_display_name:
          type: string
        user_b_password:
          type: string
          format: password
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    CreateLedgerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    AddMemberRequest:
      type: object
      required: [username, role, acknowledge_history_visibility]
      properties:
        username:
          type: string
        role:
          type: string
          enum: [editor, viewer]
        acknowledge_history_visibility:
          type: boolean
          enum: [true]
    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/LedgerRole"
    LedgerRole:
      type: string
      enum: [owner, editor, viewer]

    CreateTransactionRequest:
      type: object
      required: [type, title, amount_cents, occurred_at, payer_user_id]
      properties:
        type:
          type: string
          enum: [expense, income]
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        owner_user_id:
          type: string
        account_id:
          type: string
          nullable: true
        category_id:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [private, partner_readable, shared]
        note:
          type: string
          nullable: true
        tag_names:
          type: array
          items:
            type: string
    TransactionDefaultResponse:
      type: object
      required: [type, payer_user_id, visibility, split_method, tag_names]
      properties:
        type:
          type: string
          enum: [expense, income, shared_expense]
        category_id:
          type: string
          nullable: true
        account_id:
          type: string
          nullable: true
        payer_user_id:
          type: string
        visibility:
          type: string
          enum: [private, partner_readable]
        split_method:
          type: string
          enum: [equal, payer_only]
        tag_names:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
    UpdateTransactionRequest:
      type: object
      description: Partial update for an ordinary expense or income. Transaction type is immutable.
      properties:
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        account_id:
          type: string
          nullable: true
        category_id:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [private, partner_readable]
        tag_names:
          type: array
          items:
            type: string
        attachment_paths:
          type: array
          maxItems: 5
          items:
            type: string
    UpdateSharedExpenseRequest:
      type: object
      description: Partial update for a shared expense. Transaction type and shared visibility are immutable.
      properties:
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        category_id:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        tag_names:
          type: array
          items:
            type: string
        split_method:
          type: string
          enum: [equal, payer_only, amount, ratio, shares]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/SplitInput"
    CreateSharedExpenseRequest:
      type: object
      required: [title, amount_cents, occurred_at, payer_user_id, split_method, splits]
      properties:
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        split_method:
          type: string
          enum: [equal, payer_only, amount, ratio, shares]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/SplitInput"
    SplitInput:
      type: object
      required: [user_id, value]
      properties:
        user_id:
          type: string
        value:
          type: number
          format: double
    CreateSettlementRequest:
      type: object
      required: [from_user_id, to_user_id, amount_cents, occurred_at]
      properties:
        from_user_id:
          type: string
        to_user_id:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
    MetadataUpsertRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          description: Required for categories and accounts. Category type is expense or income.
        icon:
          type: string
        color:
          type: string
    MetadataReorderRequest:
      type: object
      required: [ordered_ids]
      properties:
        ordered_ids:
          type: array
          minItems: 1
          items:
            type: string
