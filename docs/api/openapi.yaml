        "404":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  parameters:
    LedgerIdHeaderRequired:
      name: X-Ledger-Id
      in: header
      required: true
      description: Explicit ledger id required for ledger-scoped business APIs.
      schema:
        type: string
    IfMatchLedger:
      name: If-Match
      in: header
      required: true
      description: Ledger ETag in the form "ledger:{ledgerId}:v{version}".
      schema:
        type: string
    FilenamePath:
      name: filename
      in: path
      required: true
      description: Attachment filename without path separators.
      schema:
        type: string
    LedgerIdPath:
      name: ledgerId
      in: path
      required: true
      schema:
        type: string
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
    TransactionIdPath:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
    GenericIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    BatchIdPath:
      name: batchID
      in: path
      required: true
      schema:
        type: string
    RowIdPath:
      name: rowID
      in: path
      required: true
      schema:
        type: string
    RuleIdPath:
      name: ruleID
      in: path
      required: true
      schema:
        type: string
    MetadataKindPath:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [categories, tags, accounts]
    MonthQuery:
      name: month
      in: query
      required: false
      description: Month in YYYY-MM format.
      schema:
        type: string
        pattern: "^\\d{4}-\\d{2}$"
    TypeQuery:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum: [expense, income, shared_expense, settlement]

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Success:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          additionalProperties: true
          nullable: true
    HealthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [status, db, version, schema_version, deployment_channel, import_xlsx_enabled, import_classification_mode]
          properties:
            status:
              type: string
              enum: [ok]
            db:
              type: string
              enum: [ok, error, none]
            version:
              type: string
              example: 1.3.0-rc
            schema_version:
              type: integer
              format: int64
            deployment_channel:
              type: string
              enum: [development, staging, production, unknown]
            import_xlsx_enabled:
              type: boolean
              description: Whether this runtime accepts XLSX files for WeChat import previews. Alipay and generic remain CSV-only.
            import_classification_mode:
              type: string
              enum: [off, suggest, graded]
              description: Active Task53 preview classification behavior. The default is off.
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true
    ImportParserMetadata:
      type: object
      required: [parser_version, header_row_number, parsed_rows, max_columns]
      properties:
        parser_version:
          type: string
        sheet_name:
          type: string
          nullable: true
        header_row_number:
          type: integer
        parsed_rows:
          type: integer
        scanned_sheets:
          type: integer
        max_columns:
          type: integer
    ImportClassification:
      type: object
      required: [status, confidence, matched_rule_ids, suggested_tag_ids]
      description: Explanation projection. Final values remain on the preview row selected_* fields.
      properties:
        status:
          type: string
          enum: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
        confidence:
          type: string
          enum: [high, medium, low, none]
        source:
          type: string
          nullable: true
          enum: [manual, bulk, user_rule, learned_rule, builtin, fallback]
        reason_code:
          type: string
          nullable: true
        reason_text:
          type: string
          nullable: true
        matched_rule_ids:
          type: array
          items:
            type: string
        suggested_category_id:
          type: string
          nullable: true
        suggested_account_id:
          type: string
          nullable: true
        suggested_tag_ids:
          type: array
          items:
            type: string
    ImportPreviewRow:
      type: object
      required: [id, batch_id, row_number, title, merchant, amount_cents, direction, target_transaction_type, duplicate_status, row_status, classification]
      properties:
        id:
          type: string
        batch_id:
          type: string
        row_number:
          type: integer
        occurred_at:
          type: string
          nullable: true
        title:
          type: string
        merchant:
          type: string
        description:
          type: string
          nullable: true
        amount_cents:
          type: integer
          format: int64
        direction:
          type: string
          enum: [expense, income, refund, transfer, unknown]
        target_transaction_type:
          type: string
          enum: [expense, income, skipped]
        duplicate_status:
          type: string
          enum: [new, duplicate, suspicious, invalid]
        row_status:
          type: string
          enum: [pending, adjusted, skipped, imported, failed]
        source_account:
          type: string
          nullable: true
        external_order_id:
          type: string
          nullable: true
        suspicious_reason:
          type: string
          nullable: true
        suggested_category_id:
          type: string
          nullable: true
        suggested_account_id:
          type: string
          nullable: true
        suggested_tag_ids:
          type: array
          items:
            type: string
        suggested_rule_id:
          type: string
          nullable: true
        suggestion_reason:
          type: string
          nullable: true
        selected_category_id:
          type: string
          nullable: true
        selected_account_id:
          type: string
          nullable: true
        selected_tag_ids:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [private, shared, partner_readable]
        classification:
          $ref: "#/components/schemas/ImportClassification"
        error:
          type: object
          nullable: true
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    ImportPreviewBatch:
      type: object
      required: [id, ledger_id, source_type, file_format, parser_metadata, filename, file_sha256, status, total_rows, new_rows, duplicate_rows, suspicious_rows, invalid_rows, imported_rows, skipped_rows, failed_rows, created_by_user_id, created_at, updated_at, classification_summary, rows]
      properties:
        id:
          type: string
        ledger_id:
          type: string
        source_type:
          type: string
          enum: [wechat, alipay, generic]
        file_format:
          type: string
          enum: [csv, xlsx]
        parser_metadata:
          $ref: "#/components/schemas/ImportParserMetadata"
        filename:
          type: string
        file_sha256:
          type: string
        status:
          type: string
          enum: [previewing, ready, committed, failed, expired]
        total_rows:
          type: integer
        new_rows:
          type: integer
        duplicate_rows:
          type: integer
        suspicious_rows:
          type: integer
        invalid_rows:
          type: integer
        imported_rows:
          type: integer
        skipped_rows:
          type: integer
        failed_rows:
          type: integer
        created_by_user_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        committed_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        classification_summary:
          $ref: "#/components/schemas/ImportClassificationSummary"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ImportPreviewRow"
    ImportPreviewBatchResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ImportPreviewBatch"
    ImportClassificationSummary:
      type: object
      required: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
      properties:
        auto_selected:
          type: integer
          minimum: 0
        suggested:
          type: integer
          minimum: 0
        fallback:
          type: integer
          minimum: 0
        manual:
          type: integer
          minimum: 0
        bulk:
          type: integer
          minimum: 0
        conflict:
          type: integer
          minimum: 0
        unresolved:
          type: integer
          minimum: 0
    ImportBulkClassificationRequest:
      type: object
      required: [row_ids, action]
      additionalProperties: false
      description: |
        accept_suggestions requires category_id, account_id and tag_ids to be omitted.
        apply_values requires all three fields; account_id may be null to clear it and
        tag_ids may be an empty array to clear tags.
      properties:
        row_ids:
          type: array
          minItems: 1
          maxItems: 500
          uniqueItems: true
          items:
            type: string
        action:
          type: string
          enum: [accept_suggestions, apply_values]
        category_id:
          type: string
          minLength: 1
          description: Required for apply_values and omitted for accept_suggestions.
        account_id:
          type: string
          nullable: true
          minLength: 1
          description: Required for apply_values; null clears the selected account.
        tag_ids:
          type: array
          maxItems: 8
          uniqueItems: true
          items:
            type: string
            minLength: 1
          description: Required for apply_values; an empty array clears selected tags.
    ImportClassificationRowError:
      type: object
      required: [row_id, code, message]
      properties:
        row_id:
          type: string
        code:
          type: string
          enum: [LEDGER_OBJECT_NOT_FOUND, CATEGORY_TYPE_MISMATCH, TAG_LIMIT_EXCEEDED, CLASSIFICATION_RULE_STALE]
        message:
          type: string
    ImportBulkClassificationResult:
      type: object
      required: [affected_rows, skipped_rows, conflict_rows, updated_row_ids, skipped_row_ids, conflict_row_ids, errors, summary]
      properties:
        affected_rows:
          type: integer
          minimum: 0
        skipped_rows:
          type: integer
          minimum: 0
        conflict_rows:
          type: integer
          minimum: 0
        updated_row_ids:
          type: array
          items:
            type: string
        skipped_row_ids:
          type: array
          items:
            type: string
        conflict_row_ids:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ImportClassificationRowError"
        summary:
          $ref: "#/components/schemas/ImportClassificationSummary"
    ImportBulkClassificationResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ImportBulkClassificationResult"
    ImportReclassifyRowChange:
      type: object
      required: [row_id, old_status, new_status, old_tag_ids, new_tag_ids]
      properties:
        row_id:
          type: string
        old_status:
          type: string
          enum: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
        new_status:
          type: string
          enum: [auto_selected, suggested, fallback, manual, bulk, conflict, unresolved]
        old_category_id:
          type: string
          nullable: true
        new_category_id:
          type: string
          nullable: true
        old_tag_ids:
          type: array
          items:
            type: string
        new_tag_ids:
          type: array
          items:
            type: string
    ImportReclassifyResult:
      type: object
      required: [dry_run, eligible_rows, changed_rows, unchanged_rows, protected_manual_rows, protected_bulk_rows, conflict_rows, summary, changes]
      properties:
        dry_run:
          type: boolean
        eligible_rows:
          type: integer
          minimum: 0
        changed_rows:
          type: integer
          minimum: 0
        unchanged_rows:
          type: integer
          minimum: 0
        protected_manual_rows:
          type: integer
          minimum: 0
        protected_bulk_rows:
          type: integer
          minimum: 0
        conflict_rows:
          type: integer
          minimum: 0
        summary:
          $ref: "#/components/schemas/ImportClassificationSummary"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/ImportReclassifyRowChange"
    ImportReclassifyResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ImportReclassifyResult"
    SystemDiagnostics:
      type: object
      required: [env, deployment_channel, app_base_url_set, cookie_secure, cookie_samesite, database, storage, audit_action_count, generated_at]
      properties:
        env:
          type: string
          example: production
        deployment_channel:
          type: string
          enum: [development, staging, production, unknown]
        app_base_url_set:
          type: boolean
        cookie_secure:
          type: string
          example: "true"
        cookie_samesite:
          type: string
          example: Lax
        database:
          $ref: "#/components/schemas/DiagnosticStatus"
        storage:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticStatus"
        latest_backup:
          $ref: "#/components/schemas/BackupInfo"
        audit_action_count:
          type: object
          additionalProperties:
            type: integer
        generated_at:
          type: string
          format: date-time
    DiagnosticStatus:
      type: object
      required: [key, label, status, configured]
      properties:
        key:
          type: string
          example: backup_dir
        label:
          type: string
          example: 备份目录
        status:
          type: string
          enum: [ok, warning, error]
        configured:
          type: boolean
        writable:
          type: boolean
        message:
          type: string
        version:
          type: integer
          format: int64
    BackupInfo:
      type: object
      required: [filename, size_bytes, created_at]
      properties:
        filename:
          type: string
          description: Relative backup filename, never an absolute path.
        size_bytes:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    LedgerExportPackage:
      type: object
      required:
        - manifest
        - ledger_members
        - users
        - categories
        - tags
        - accounts
        - transaction_defaults
        - transactions
        - transaction_tags
        - transaction_splits
        - settlements
        - transaction_templates
        - recurring_rules
        - recurring_reminders
        - import_batches
        - import_items
        - transaction_import_refs
        - import_rules
        - audit_logs
      properties:
        manifest:
          $ref: "#/components/schemas/LedgerExportManifest"
        ledger_members:
          $ref: "#/components/schemas/LedgerExportRecords"
        users:
          $ref: "#/components/schemas/LedgerExportRecords"
        categories:
          $ref: "#/components/schemas/LedgerExportRecords"
        tags:
          $ref: "#/components/schemas/LedgerExportRecords"
        accounts:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_defaults:
          $ref: "#/components/schemas/LedgerExportRecords"
        transactions:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_tags:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_splits:
          $ref: "#/components/schemas/LedgerExportRecords"
        settlements:
          $ref: "#/components/schemas/LedgerExportRecords"
        transaction_templates:
          $ref: "#/components/schemas/LedgerExportRecords"
        recurring_rules:
          $ref: "#/components/schemas/LedgerExportRecords"
        recurring_reminders:
          $ref: "#/components/schemas/LedgerExportRecords"
        import_batches:
          description: Owner-only visible import batches; always an empty array for Editor.
          allOf:
            - $ref: "#/components/schemas/LedgerExportRecords"
        import_items:
          description: Owner-only uncommitted own rows or rows linked to actor-visible transactions; always empty for Editor.
          allOf:
            - $ref: "#/components/schemas/LedgerExportRecords"
        transaction_import_refs:
          description: Import provenance references restricted to actor-visible transactions for Owner and Editor.
          allOf:
            - $ref: "#/components/schemas/LedgerExportRecords"
        import_rules:
          description: Owner-only ledger import rules; always an empty array for Editor.
          allOf:
            - $ref: "#/components/schemas/LedgerExportRecords"
        audit_logs:
          description: Actor-visible audit rows; import audit rows require import-management permission and visible import scope.
          allOf:
            - $ref: "#/components/schemas/LedgerExportRecords"
    LedgerExportManifest:
      type: object
      required: [format, format_version, purpose, restorable, exported_at, schema_version, ledger, actor]
      properties:
        format:
          type: string
          enum: [ledger_two_ledger_export]
        format_version:
          type: integer
          enum: [1]
        purpose:
          type: string
          enum: [portable_read_only_snapshot]
        restorable:
          type: boolean
          enum: [false]
        exported_at:
          type: string
          format: date-time
        schema_version:
          type: integer
          format: int64
          example: 21
        ledger:
          type: object
          required: [id, name, default_currency, status, version, created_at, updated_at]
          additionalProperties: true
        actor:
          type: object
          required: [user_id, role]
          properties:
            user_id:
              type: string
            role:
              type: string
              enum: [owner, editor]
    LedgerExportRecords:
      type: array
      items:
        type: object
        additionalProperties: true

    InitSetupRequest:
      type: object
      required:
        - ledger_name
        - user_a_username
        - user_a_display_name
        - user_a_password
        - user_b_username
        - user_b_display_name
        - user_b_password
      properties:
        ledger_name:
          type: string
        default_currency:
          type: string
          default: CNY
        user_a_username:
          type: string
        user_a_display_name:
          type: string
        user_a_password:
          type: string
          format: password
        user_b_username:
          type: string
        user_b_display_name:
          type: string
        user_b_password:
          type: string
          format: password
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    CreateLedgerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    AddMemberRequest:
      type: object
      required: [username, role, acknowledge_history_visibility]
      properties:
        username:
          type: string
        role:
          type: string
          enum: [editor, viewer]
        acknowledge_history_visibility:
          type: boolean
          enum: [true]
    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/LedgerRole"
    LedgerRole:
      type: string
      enum: [owner, editor, viewer]

    CreateTransactionRequest:
      type: object
      required: [type, title, amount_cents, occurred_at, payer_user_id]
      properties:
        type:
          type: string
          enum: [expense, income]
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        owner_user_id:
          type: string
        account_id:
          type: string
          nullable: true
        category_id:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [private, partner_readable, shared]
        note:
          type: string
          nullable: true
        tag_names:
          type: array
          items:
            type: string
    TransactionDefaultResponse:
      type: object
      required: [type, payer_user_id, visibility, split_method, tag_names]
      properties:
        type:
          type: string
          enum: [expense, income, shared_expense]
        category_id:
          type: string
          nullable: true
        account_id:
          type: string
          nullable: true
        payer_user_id:
          type: string
        visibility:
          type: string
          enum: [private, partner_readable]
        split_method:
          type: string
          enum: [equal, payer_only]
        tag_names:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
    UpdateTransactionRequest:
      type: object
      description: Partial update for an ordinary expense or income. Transaction type is immutable.
      properties:
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        account_id:
          type: string
          nullable: true
        category_id:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [private, partner_readable]
        tag_names:
          type: array
          items:
            type: string
        attachment_paths:
          type: array
          maxItems: 5
          items:
            type: string
    UpdateSharedExpenseRequest:
      type: object
      description: Partial update for a shared expense. Transaction type and shared visibility are immutable.
      properties:
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        category_id:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        tag_names:
          type: array
          items:
            type: string
        split_method:
          type: string
          enum: [equal, payer_only, amount, ratio, shares]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/SplitInput"
    CreateSharedExpenseRequest:
      type: object
      required: [title, amount_cents, occurred_at, payer_user_id, split_method, splits]
      properties:
        title:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        payer_user_id:
          type: string
        split_method:
          type: string
          enum: [equal, payer_only, amount, ratio, shares]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/SplitInput"
    SplitInput:
      type: object
      required: [user_id, value]
      properties:
        user_id:
          type: string
        value:
          type: number
          format: double
    CreateSettlementRequest:
      type: object
      required: [from_user_id, to_user_id, amount_cents, occurred_at]
      properties:
        from_user_id:
          type: string
        to_user_id:
          type: string
        amount_cents:
          type: integer
          format: int64
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
    MetadataUpsertRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          description: Required for categories and accounts. Category type is expense or income.
        icon:
          type: string
        color:
          type: string
    MetadataReorderRequest:
      type: object
      required: [ordered_ids]
      properties:
        ordered_ids:
          type: array
          minItems: 1
          items:
            type: string
